name: Build native wheels

on:
  workflow_dispatch:
    inputs:
      torch_version:
        description: PyTorch version used to compile the ABI-specific wheels
        required: true
        default: "2.8.0"
      dnnl_version:
        description: oneDNN git tag compiled and bundled into each wheel
        required: true
        default: "v3.8.1"
      package_version:
        description: Python package version, without or with a leading v
        required: true
        default: "0.1.0"
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  wheels-linux:
    name: Linux ${{ matrix.arch }} / torch ${{ inputs.torch_version || '2.8.0' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      CIBW_ENVIRONMENT: >-
        ODNN_BUILD_NATIVE=1
        DNNL_ROOT=/opt/onednn
        DNNL_VERSION=${{ inputs.dnnl_version || 'v3.8.1' }}
        ODNN_PACKAGE_VERSION=${{ github.event.release.tag_name || inputs.package_version || '0.1.0' }}
        LD_LIBRARY_PATH=/opt/onednn/lib:/opt/onednn/lib64
      CIBW_ARCHS_LINUX: ${{ matrix.arch }}
      CIBW_BEFORE_ALL_LINUX: >-
        bash {project}/tools/build_onednn.sh
      CIBW_BEFORE_BUILD_LINUX: >-
        python -m pip install
        torch==${{ inputs.torch_version || '2.8.0' }}
        ninja
      CIBW_TEST_REQUIRES: torch==${{ inputs.torch_version || '2.8.0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install wheel builder
        run: python -m pip install "cibuildwheel==2.23.3"

      - name: Build and repair wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Verify bundled native libraries
        run: python tools/verify_wheel_contents.py wheelhouse/*.whl

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}-torch-${{ inputs.torch_version || '2.8.0' }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    name: Publish wheels to PyPI
    if: github.event_name == 'release'
    needs: wheels-linux
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/onednn-extension-demo/
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-linux-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
